# Obsidian Vault
vault_path = "/path/to/your/Obsidian/AI Second Brain"

# Image output directory
image_output_dir = "Images"

# Default image aspect ratio
default_aspect_ratio = "16:9"

# Text generation model (used for concept extraction)
llm_model = "gpt-5.4"

# Image generation model
image_model = "gpt-image-2"

# Image quality tier: low | medium | high (higher = more detail and higher cost)
image_quality = "medium"

# Language
default_language = "ja"

# Auto commit generated notes
auto_commit = false
